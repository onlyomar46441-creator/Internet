<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>S46441 BOT</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      background: linear-gradient(145deg, #0f1219 0%, #0a0c12 100%);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Cairo', sans-serif;
      color: #eef2ff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 1rem;
    }

    /* header */
    .app-header {
      background: rgba(10, 12, 18, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(74, 85, 128, 0.3);
      padding: 0.6rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
      z-index: 10;
    }

    .logo h1 {
      font-size: 1.2rem;
      background: linear-gradient(135deg, #c084fc, #60a5fa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .model-selector {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      background: #0f1322;
      padding: 0.3rem 0.8rem;
      border-radius: 2rem;
      border: 1px solid #2a324b;
    }

    .model-selector label {
      font-size: 0.8rem;
      color: #cbd5ff;
    }

    select {
      background: #0f1322;
      border: none;
      color: #eef2ff;
      font-size: 0.85rem;
      padding: 0.2rem 0.3rem;
      border-radius: 1.2rem;
      cursor: pointer;
    }

    .advanced-toggle {
      background: #1e293b;
      border-radius: 2rem;
      padding: 0.3rem 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.8rem;
      transition: 0.2s;
    }

    /* advanced panel */
    .advanced-panel {
      background: #0f1322;
      border-bottom: none;
      padding: 0;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out, padding 0.3s ease-out, border 0.3s;
      flex-shrink: 0;
    }

    .advanced-panel.open {
      max-height: 50vh;
      padding: 0.8rem 1rem;
      border-bottom: 1px solid #2a324b;
      overflow-y: auto;
    }

    .advanced-section {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.8rem;
    }

    .field-group {
      margin-bottom: 0.5rem;
    }

    .field-group label {
      display: block;
      font-size: 0.75rem;
      color: #cbd5ff;
      margin-bottom: 0.2rem;
    }

    .field-group textarea, .field-group input, .field-group select {
      width: 100%;
      background: #1e2538;
      border: 1px solid #2a324b;
      border-radius: 0.8rem;
      padding: 0.5rem 0.7rem;
      color: #f0f3ff;
      font-size: 0.85rem;
      font-family: inherit;
    }

    .slider-container {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .checkbox-group {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    .system-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.3rem;
    }

    .chip {
      background: #1e293b;
      border-radius: 40px;
      padding: 0.2rem 0.7rem;
      font-size: 0.7rem;
      cursor: pointer;
      border: 1px solid #334155;
    }

    .small-btn {
      background: #2d374f;
      padding: 0.2rem 0.7rem;
      border-radius: 1.2rem;
      font-size: 0.7rem;
      cursor: pointer;
      border: none;
      color: white;
    }

    .token-usage {
      font-size: 0.65rem;
      background: #10131f;
      padding: 0.1rem 0.5rem;
      border-radius: 1rem;
      display: inline-block;
    }

    /* chat container - takes remaining space */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 0.8rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      min-height: 0;  /* essential for flex children to shrink */
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      align-self: flex-start;
    }

    .message.user {
      align-self: flex-end;
    }

    .message-bubble {
      padding: 0.6rem 1rem;
      border-radius: 1.2rem;
      line-height: 1.4;
      word-wrap: break-word;
      white-space: pre-wrap;
      font-size: 0.9rem;
    }

    .message.user .message-bubble {
      background: linear-gradient(95deg, #6366f1, #8b5cf6);
      color: white;
      border-bottom-left-radius: 0.2rem;
    }

    .message.assistant .message-bubble {
      background: #1e293b;
      border-bottom-right-radius: 0.2rem;
      border: 1px solid #334155;
    }

    .message-meta {
      font-size: 0.65rem;
      margin: 0.1rem 0.5rem;
      color: #9ca3cf;
    }

    /* input area - fixed at bottom */
    .input-area {
      background: rgba(10, 12, 18, 0.9);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(74, 85, 128, 0.3);
      padding: 0.6rem 1rem;
      display: flex;
      gap: 0.6rem;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .input-wrapper {
      flex: 1;
      background: #0f1322;
      border-radius: 2rem;
      border: 1px solid #2a324b;
      display: flex;
      align-items: center;
      padding: 0.4rem 0.8rem;
    }

    textarea {
      width: 100%;
      background: transparent;
      border: none;
      color: #eef2ff;
      font-size: 0.9rem;
      font-family: inherit;
      resize: none;
      outline: none;
      padding: 0.2rem 0;
      max-height: 100px;
    }

    button {
      background: #4f46e5;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.85rem;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    button.primary {
      background: linear-gradient(95deg, #6366f1, #8b5cf6);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #cbd5ff;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #tokenDisplay {
      position: fixed;
      bottom: 4px;
      left: 8px;
      font-size: 0.6rem;
      background: #0f1322;
      padding: 0.1rem 0.4rem;
      border-radius: 1rem;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div class="app-header">
  <div class="logo"><h1>✨ S46441 BOT</h1></div>
  <div class="model-selector">
    <label>🤖 Models</label>
    <select id="modelSelect">
      <option value="openai/gpt-4.1"selected>GPT-4.1</option>
      <option value="openai/gpt-4.1-mini">GPT-4.1-mini</option>
      <option value="openai/gpt-4.1-nano">GPT-4.1-nano</option>
      <option value="openai/gpt-4o">GPT-4o</option>
      <option value="openai/gpt-4o-mini" >GPT-4o-mini</option>
      <option value="openai/o1">o1</option>
      <option value="openai/o1-mini">o1-mini</option>
      <option value="openai/o3-mini">o3-mini</option>
      <option value="xai/grok-3">Grok-3</option>
      <option value="xai/grok-3-fast">Grok-3-fast</option>
      <option value="meta-llama/llama-3.3-70b-instruct">Llama 3.3 70B</option>
      <option value="meta-llama/llama-3.2-90b-vision-instruct">Llama 3.2 90B Vision</option>
      <option value="meta-llama/llama-3.2-11b-vision-instruct">Llama 3.2 11B Vision</option>
      <option value="meta-llama/llama-3.1-405b-instruct">Llama 3.1 405B</option>
      <option value="meta-llama/llama-3.1-70b-instruct">Llama 3.1 70B</option>
      <option value="meta-llama/llama-3.1-8b-instruct">Llama 3.1 8B</option>
      <option value="mistralai/mistral-large-2411">Mistral Large</option>
      <option value="mistralai/mistral-small-2501">Mistral Small</option>
      <option value="mistralai/mistral-nemo">Mistral Nemo</option>
      <option value="cohere/command-r-plus">Cohere Command R+</option>
      <option value="cohere/command-r">Cohere Command R</option>
      <option value="google/gemma-2-27b-it">Gemma 2 27B</option>
      <option value="google/gemma-2-9b-it">Gemma 2 9B</option>
      <option value="microsoft/phi-3.5-mini-instruct">Phi-3.5-mini</option>
    </select>
  </div>
  <div class="advanced-toggle" id="advancedToggle">
Advanced Options
  </div>
</div>

<!-- Advanced Panel -->
<div id="advancedPanel" class="advanced-panel">
  <div class="advanced-section">
    <div class="field-group">
      <label>SystemPrompt 🧠</label>
      <textarea id="systemMsg" rows="2">أنت مساعد خبير ومبدع، تقدم إجابات دقيقة وواضحة باللغة العربية أو الإنجليزية حسب لغة المستخدم.</textarea>
      <div class="system-chips" id="systemPresets">
        <span class="chip" data-persona="أنت طالب في جامعة عين شمس، تدرس التكنولوجيا. أجب بطريقة أكاديمية شبابية مع الاستشهاد بالمصادر عند الاقتضاء.">🎓 طالب عين شمس</span>
        <span class="chip" data-persona="أنت دكتوراه في الأمن السيبراني، خبير في الاختراق الأخلاقي وحماية الشبكات. أجب بلغة تقنية دقيقة مع تقديم أمثلة عملية.">🛡️ دكتور أمن سيبراني</span>
        <span class="chip" data-persona="أنت مطور برمجيات محترف، تقدم حلولاً عملية مع أمثلة كود حقيقية. ركز على البساطة والكفاءة.">💻 مطور برمجيات</span>
        <span class="chip" data-persona="أنت كاتب إبداعي، أسلوبك أدبي شيّق، تستخدم الاستعارات والتشبيهات لتوضيح الأفكار.">✍️ كاتب إبداعي</span>
        <span class="chip" data-persona="أنت معلم لغة عربية فصيح، تهتم بالإعراب والبلاغة وتصحيح الأخطاء اللغوية.">📖 معلم لغة عربية</span>
        <span class="chip" data-persona="أنت مساعد تقني محايد، تقدم إجابات موضوعية دون آراء شخصية.">⚖️ مساعد محايد</span>
      </div>
      <button id="resetSystemBtn" class="small-btn" style="margin-top:3px;">🔄 إعادة تعيين</button>
    </div>

    <div class="field-group">
      <label>Prompt</label>
      <textarea id="persistentPrompt" rows="2" placeholder="يضاف لكل رسالة"></textarea>
    </div>
    <div class="field-group">
      <label>Context</label>
      <textarea id="contextInput" rows="1" placeholder="خلفية دائمة"></textarea>
    </div>
    <div class="field-group">
      <label>⚙️ Task </label>
      <textarea id="taskInput" rows="1" placeholder="المهمة المطلوبة"></textarea>
    </div>
    <div class="field-group">
      <label>🎨 Format</label>
      <textarea id="formatInput" rows="1" placeholder="نقاط / فقرات / جدول"></textarea>
    </div>
    <div class="field-group">
      <label>👤 Personal/Character</label>
      <textarea id="personalInput" rows="1" placeholder="الجمهور المستهدف"></textarea>
    </div>
    <div class="field-group">
      <label>🎯 Goal</label>
      <textarea id="goalInput" rows="1" placeholder="الهدف من الإجابات"></textarea>
    </div>
    <div class="field-group">
      <label>📝 Purpose</label>
      <textarea id="extraPrompt" rows="1" placeholder="توجيه إضافي دائم"></textarea>
    </div>
  </div>

  <div style="margin-top: 0.8rem; border-top: 1px solid #2a324b; padding-top: 0.6rem;">
    <div class="slider-container">
      <label style="width:100px;">🌡Creativity Degree</label>
      <input type="range" id="tempSlider" min="0" max="2" step="0.05" value="0.7" style="flex:1;">
      <span id="tempValue" class="token-usage">0.70</span>
    </div>
    <div class="slider-container">
      <label style="width:100px;">Response Maximum Limit</label>
      <input type="range" id="maxTokensSlider" min="100" max="4000" step="50" value="800" style="flex:1;">
      <span id="maxTokensValue" class="token-usage">800</span>
    </div>
    <div class="checkbox-group">
      <label><input type="checkbox" id="noPolishCheck">منع التجويد 🚫</label>
      <label><input type="checkbox" id="fullInfoCheck"> 📚 إجابات شاملة</label>
    </div>
  </div>
</div>

<!-- Chat messages -->
<div class="chat-container" id="chatContainer">
  <div class="message assistant">
    <div class="message-bubble">
مرحبا انا مساعدك S46441 
    </div>
    <div class="message-meta">AI Assistant</div>
  </div>
</div>

<!-- Input area -->
<div class="input-area">
  <div class="input-wrapper">
    <textarea id="userInput" rows="1" placeholder="Ask Anything"></textarea>
  </div>
  <button id="sendBtn" class="primary">Send</button>
  <button id="clearChatBtn" style="background:#2d374f;">➕️ New Chat </button>
</div>

<div id="tokenDisplay"></div>

<script>
  // ========== ضع الـ token الخاص بك هنا ==========
  const HARDCODED_TOKEN = "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";   // <--- اكتب الـ token بين علامتي التنصيص
  // ==============================================

  if (!HARDCODED_TOKEN) {
    alert("⚠️ لم يتم إدخال GitHub Token في الكود. ابحث عن const HARDCODED_TOKEN وأضف المفتاح.");
  }

  // DOM elements
  const modelSelect = document.getElementById('modelSelect');
  const systemMsg = document.getElementById('systemMsg');
  const persistentPrompt = document.getElementById('persistentPrompt');
  const contextInput = document.getElementById('contextInput');
  const taskInput = document.getElementById('taskInput');
  const formatInput = document.getElementById('formatInput');
  const personalInput = document.getElementById('personalInput');
  const goalInput = document.getElementById('goalInput');
  const extraPrompt = document.getElementById('extraPrompt');
  const sendBtn = document.getElementById('sendBtn');
  const clearChatBtn = document.getElementById('clearChatBtn');
  const userInput = document.getElementById('userInput');
  const chatContainer = document.getElementById('chatContainer');
  const tokenDisplay = document.getElementById('tokenDisplay');
  const advancedToggle = document.getElementById('advancedToggle');
  const advancedPanel = document.getElementById('advancedPanel');
  const resetSystemBtn = document.getElementById('resetSystemBtn');
  const tempSlider = document.getElementById('tempSlider');
  const tempValue = document.getElementById('tempValue');
  const maxTokensSlider = document.getElementById('maxTokensSlider');
  const maxTokensValue = document.getElementById('maxTokensValue');
  const noPolishCheck = document.getElementById('noPolishCheck');
  const fullInfoCheck = document.getElementById('fullInfoCheck');

  let conversation = [];

  advancedToggle.addEventListener('click', () => {
    advancedPanel.classList.toggle('open');
    advancedToggle.textContent = advancedPanel.classList.contains('open') ? '🔽 Hide Options' : '⚙️ Advanced Options';
  });

  tempSlider.addEventListener('input', () => {
    tempValue.innerText = parseFloat(tempSlider.value).toFixed(2);
  });
  maxTokensSlider.addEventListener('input', () => {
    maxTokensValue.innerText = maxTokensSlider.value;
  });

  const systemPresets = document.querySelectorAll('#systemPresets .chip');
  systemPresets.forEach(chip => {
    chip.addEventListener('click', () => {
      const persona = chip.getAttribute('data-persona');
      if (persona) {
        let current = systemMsg.value.trim();
        if (current && !current.endsWith('\n')) current += '\n';
        systemMsg.value = current + (current ? '\n' : '') + persona;
      }
    });
  });

  resetSystemBtn.addEventListener('click', () => {
    systemMsg.value = "أنت مساعد خبير ومبدع، تقدم إجابات دقيقة وواضحة باللغة العربية أو الإنجليزية حسب لغة المستخدم.";
  });

  clearChatBtn.addEventListener('click', () => {
    conversation = [];
    chatContainer.innerHTML = `
      <div class="message assistant">
        <div class="message-bubble">✨ تم مسح المحادثة. يمكنك البدء من جديد.</div>
        <div class="message-meta">AI Assistant</div>
      </div>
    `;
    tokenDisplay.innerText = '';
  });

  function addMessageToChat(role, content) {
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'message-bubble';
    bubble.innerHTML = content.replace(/\n/g, '<br>');
    const meta = document.createElement('div');
    meta.className = 'message-meta';
    meta.innerText = role === 'user' ? 'أنت' : 'AI Assistant';
    messageDiv.appendChild(bubble);
    messageDiv.appendChild(meta);
    chatContainer.appendChild(messageDiv);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  function buildUserMessage(mainText) {
    let parts = [];
    parts.push(`الموضوع الرئيسي:\n${mainText}`);
    const persistent = persistentPrompt.value.trim();
    if (persistent) parts.push(`توجيه دائم:\n${persistent}`);
    const context = contextInput.value.trim();
    if (context) parts.push(`السياق (Context):\n${context}`);
    const task = taskInput.value.trim();
    if (task) parts.push(`المهمة (Task):\n${task}`);
    const format = formatInput.value.trim();
    if (format) parts.push(`التنسيق (Format):\n${format}`);
    const personal = personalInput.value.trim();
    if (personal) parts.push(`الشخصية/الجمهور (Personal):\n${personal}`);
    const goal = goalInput.value.trim();
    if (goal) parts.push(`الهدف (Goal):\n${goal}`);
    const extra = extraPrompt.value.trim();
    if (extra) parts.push(`توجيه إضافي:\n${extra}`);
    return parts.join('\n\n');
  }

  async function sendMessage() {
    const userText = userInput.value.trim();
    if (!userText) return;

    const enhancedUserMessage = buildUserMessage(userText);
    addMessageToChat('user', userText);
    conversation.push({ role: "user", content: enhancedUserMessage });

    const model = modelSelect.value;
    let system = systemMsg.value.trim() || "أنت مساعد ذكي.";
    let temperature = parseFloat(tempSlider.value);
    let maxTokens = parseInt(maxTokensSlider.value, 10);

    if (noPolishCheck.checked) {
      temperature = 0;
      system += "\n\nقدم إجابتك مباشرة دون تجميل أو استطراد. كن موجزاً ودقيقاً.";
    }
    if (fullInfoCheck.checked) {
      maxTokens = 4000;
      system += "\n\nقدم أكبر قدر ممكن من المعلومات بشكل شامل ومفصل. اذكر التفاصيل والأمثلة دون اختصار.";
    }

    const messagesForApi = [
      { role: "system", content: system },
      ...conversation
    ];

    const loadingId = Date.now();
    const loadingDiv = document.createElement('div');
    loadingDiv.id = `loading-${loadingId}`;
    loadingDiv.className = 'message assistant';
    loadingDiv.innerHTML = `<div class="message-bubble"><span class="loading"></span> جاري التفكير...</div><div class="message-meta">AI Assistant</div>`;
    chatContainer.appendChild(loadingDiv);
    chatContainer.scrollTop = chatContainer.scrollHeight;

    sendBtn.disabled = true;

    try {
      const response = await fetch('https://models.github.ai/inference/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${HARDCODED_TOKEN}`
        },
        body: JSON.stringify({
          model: model,
          messages: messagesForApi,
          temperature: temperature,
          max_tokens: maxTokens,
          stream: false
        })
      });

      if (!response.ok) {
        let errorDetail = `HTTP ${response.status}`;
        try {
          const errData = await response.json();
          errorDetail = errData.error?.message || errorDetail;
        } catch(e) {}
        throw new Error(`❌ فشل الطلب: ${errorDetail}`);
      }

      const data = await response.json();
      const aiMessage = data.choices[0]?.message?.content || "⚠️ لم يتم استلام رد.";
      const usage = data.usage;

      document.getElementById(`loading-${loadingId}`)?.remove();
      addMessageToChat('assistant', aiMessage);
      conversation.push({ role: "assistant", content: aiMessage });

      if (usage) {
        tokenDisplay.innerText = `🔢 tokens: ${usage.prompt_tokens} مدخل | ${usage.completion_tokens} مخرج`;
      } else {
        tokenDisplay.innerText = '';
      }

      userInput.value = '';
      userInput.style.height = 'auto';
    } catch (err) {
      document.getElementById(`loading-${loadingId}`)?.remove();
      addMessageToChat('assistant', `⚠️ خطأ: ${err.message}`);
      tokenDisplay.innerText = 'فشل الاتصال';
    } finally {
      sendBtn.disabled = false;
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  userInput.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      sendMessage();
    }
  });

  userInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = (this.scrollHeight) + 'px';
  });
</script>
</body>
</html>
