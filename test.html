<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenRouter - جميع النماذج (ملف واحد)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
        }
        .input-area textarea,
        .input-area input,
        .input-area select {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
        }
        .input-area textarea::placeholder,
        .input-area input::placeholder {
            color: #94a3b8;
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            direction: ltr;
            text-align: left;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 font-sans">
    <div class="w-full max-w-2xl glass p-6 md:p-8 space-y-6 text-white shadow-2xl">

        <h1 class="text-3xl font-bold text-center bg-gradient-to-l from-blue-400 to-purple-500 bg-clip-text text-transparent">
            🤖 OpenRouter Chat
        </h1>
        <p class="text-center text-gray-300 text-sm">
            أدخل مفتاح API من <a href="https://openrouter.ai/keys" target="_blank" class="text-blue-400 underline">openrouter.ai/keys</a>
            <br>• GPT-3.5 Turbo مجاني، باقي النماذج تحتاج رصيد
        </p>

        <!-- حقل المفتاح -->
        <div class="input-area">
            <label class="block text-sm font-medium mb-1">🔑 مفتاح API</label>
            <input type="password" id="apiKey" placeholder="sk-or-..."
                   class="w-full p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition">
        </div>

        <!-- اختيار النموذج -->
        <div class="input-area">
            <label class="block text-sm font-medium mb-1">🧠 النموذج</label>
            <select id="model" class="w-full p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition">
                <option value="openai/gpt-4o">GPT-4o</option>
                <option value="openai/gpt-4-turbo">GPT-4 Turbo</option>
                <option value="openai/gpt-3.5-turbo" selected>GPT-3.5 Turbo (مجاني)</option>
                <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
                <option value="anthropic/claude-3-opus">Claude 3 Opus</option>
                <option value="google/gemini-pro-1.5">Gemini Pro 1.5</option>
                <option value="google/gemini-flash-1.5">Gemini Flash 1.5</option>
                <option value="meta-llama/llama-3-70b-instruct">Llama 3 70B</option>
                <option value="mistralai/mistral-large">Mistral Large</option>
            </select>
        </div>

        <!-- توجيه النظام -->
        <div class="input-area">
            <label class="block text-sm font-medium mb-1">⚙️ توجيه النظام</label>
            <input type="text" id="systemPrompt" placeholder="أنت مساعد مختصر..."
                   class="w-full p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition">
        </div>

        <!-- رسالة المستخدم -->
        <div class="input-area">
            <label class="block text-sm font-medium mb-1">💬 رسالتك</label>
            <textarea id="userMessage" rows="4" placeholder="اكتب سؤالك هنا..."
                      class="w-full p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition resize-none"></textarea>
        </div>

        <!-- زر الإرسال -->
        <button id="sendBtn"
                class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700
                       text-white font-bold py-3 rounded-xl transition flex items-center justify-center gap-2">
            <span id="btnText">إرسال ✨</span>
            <span id="loadingSpinner" class="hidden animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></span>
        </button>

        <!-- الرد -->
        <div class="mt-6">
            <h2 class="text-lg font-semibold mb-2">📥 الرد</h2>
            <div id="responseBox" class="bg-black/30 rounded-xl p-4 min-h-[100px] text-sm text-gray-200 border border-white/10">
                <span class="text-gray-500">في انتظار السؤال...</span>
            </div>
        </div>

        <p class="text-center text-xs text-gray-500 mt-4">
            ⚠️ المفتاح يُحفظ محليًا في متصفحك فقط
        </p>
    </div>

    <script>
        const apiKeyInput = document.getElementById('apiKey');
        const modelSelect = document.getElementById('model');
        const systemPromptInput = document.getElementById('systemPrompt');
        const userMessageInput = document.getElementById('userMessage');
        const sendBtn = document.getElementById('sendBtn');
        const btnText = document.getElementById('btnText');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const responseBox = document.getElementById('responseBox');

        // استعادة المفتاح من localStorage
        const savedKey = localStorage.getItem('openrouter_key');
        if (savedKey) apiKeyInput.value = savedKey;

        apiKeyInput.addEventListener('change', () => {
            localStorage.setItem('openrouter_key', apiKeyInput.value);
        });

        sendBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) return alert('يرجى إدخال مفتاح API');

            const userMessage = userMessageInput.value.trim();
            if (!userMessage) return alert('يرجى كتابة الرسالة');

            const messages = [];
            const systemPrompt = systemPromptInput.value.trim();
            if (systemPrompt) messages.push({ role: 'system', content: systemPrompt });
            messages.push({ role: 'user', content: userMessage });

            // واجهة التحميل
            sendBtn.disabled = true;
            btnText.classList.add('hidden');
            loadingSpinner.classList.remove('hidden');
            responseBox.innerHTML = '<span class="text-gray-400">⏳ جاري التحميل...</span>';

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: modelSelect.value,
                        messages: messages,
                        stream: false,
                        temperature: 0.7,
                    }),
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error?.message || `خطأ ${response.status}`);
                }

                const reply = data.choices?.[0]?.message?.content;
                responseBox.innerHTML = reply
                    ? `<pre class="text-sm text-gray-100">${escapeHtml(reply)}</pre>`
                    : '<span class="text-yellow-400">⚠️ لم يتم استلام رد</span>';

            } catch (error) {
                console.error(error);
                responseBox.innerHTML = `<span class="text-red-400">❌ ${escapeHtml(error.message)}</span>`;
            } finally {
                sendBtn.disabled = false;
                btnText.classList.remove('hidden');
                loadingSpinner.classList.add('hidden');
            }
        });

        // Enter للإرسال (Shift+Enter لسطر جديد)
        userMessageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
